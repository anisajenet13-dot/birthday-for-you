<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>For You 🤍</title>

<!-- font aesthetic -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: linear-gradient(135deg, #e0eafc, #cfdef3);
  overflow: hidden;
}

/* layout */
.screen {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  transition: opacity 1s ease;
}

.hidden {
  opacity: 0;
  pointer-events: none;
}

/* title */
h1 {
  font-family: 'Playfair Display', serif;
  font-size: 36px;
  font-weight: 500;
  letter-spacing: 1px;
  color: #2c2c2c;
}

/* button */
button {
  margin-top: 20px;
  padding: 10px 24px;
  border-radius: 25px;
  border: 1px solid #444;
  background: transparent;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  transition: 0.3s;
}

button:hover {
  background: rgba(0,0,0,0.05);
}

/* text */
#text {
  max-width: 420px;
  text-align: center;
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  line-height: 1.8;
  color: #444;
  margin-top: 15px;
}

.fade {
  opacity: 0;
  transform: translateY(10px);
  animation: fadeUp 1s forwards;
}

@keyframes fadeUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* particles */
.particle {
  position: absolute;
  width: 6px;
  height: 6px;
  background: rgb(96, 199, 251);
  border-radius: 50%;
  opacity: 0.5;
  animation: float 10s linear infinite;
}

@keyframes float {
  from {transform: translateY(100vh);}
  to {transform: translateY(-10vh);}
}
</style>
</head>

<body>

<!-- Screen 1 -->
<div id="screen1" class="screen">
  <h1>haii sayangg 🤍</h1>
  <button onclick="next()">open</button>
</div>

<!-- Screen 2 -->
<div id="screen2" class="screen hidden">
  <h1>happy birthday</h1>
  <div id="text"></div>
</div>

<script>
const messages = [
  "selamat ulang tahun ya, sayang. di usiamu yang baru ini, aku berdoa semoga kamu terus bertumbuh menjadi pribadi yang lebih dewasa, bijaksana, dan selalu mengandalkan Tuhan dalam setiap langkahmu.",
  
  "semoga Tuhan Yesus selalu melancarkan kuliahmu dan menuntun masa depanmu dengan baik. aku juga berdoa untuk keluargamu, semoga selalu diberi kesehatan, kedamaian, dan berkat yang melimpah.",
  
  "untuk hubungan kita yang baru ini, semoga Tuhan selalu menyertai dan menjaga komunikasi kita. semoga ke depannya kita bisa saling mendukung, bertumbuh bersama, dan tetap berjalan dalam satu tujuan.",
  
  "God bless you and your family, always 🤍"
];

let index = 0;

function next() {
  document.getElementById("screen1").classList.add("hidden");
  document.getElementById("screen2").classList.remove("hidden");
  showNext();
}

function showNext() {
  if (index < messages.length) {
    const p = document.createElement("p");
    p.className = "fade";
    p.innerText = messages[index];
    document.getElementById("text").appendChild(p);
    index++;
    setTimeout(showNext, 2000);
  }
}

/* particles */
for (let i = 0; i < 40; i++) {
  let p = document.createElement("div");
  p.className = "particle";
  p.style.left = Math.random() * 100 + "vw";
  p.style.animationDuration = (5 + Math.random() * 5) + "s";
  document.body.appendChild(p);
}
</script>

</body>
</html>
