<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>For You 🤍</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #e0eafc, #cfdef3);
  overflow: hidden;
}

.screen {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  transition: opacity 1s ease;
}

.hidden {
  opacity: 0;
  pointer-events: none;
}

h1 {
  font-weight: 400;
  color: #333;
}

button {
  margin-top: 20px;
  padding: 10px 20px;
  border-radius: 20px;
  border: 1px solid #333;
  background: transparent;
  cursor: pointer;
}

/* particles */
.particle {
  position: absolute;
  width: 6px;
  height: 6px;
  background: rgb(96, 199, 251);
  border-radius: 50%;
  opacity: 0.5;
  animation: float 10s linear infinite;
}

@keyframes float {
  from {transform: translateY(100vh);}
  to {transform: translateY(-10vh);}
}

#text {
  max-width: 400px;
  text-align: center;
  line-height: 1.6;
}
</style>
</head>

<body>

<!-- Screen 1 -->
<div id="screen1" class="screen">
  <h1>haii sayangg 🤍</h1>
  <button onclick="next()">open</button>
</div>

<!-- Screen 2 -->
<div id="screen2" class="screen hidden">
  <h1>happy birthday</h1>
  <div id="text"></div>
</div>

<script>
const message = "selamat ulang tahun yaa sayang. di usiamu yang baru ini, doaku semoga kamu tumbuh jadi lelaki yang makin dewasa, bijaksana, dan selalu takut akan Tuhan. semoga Tuhan Yesus selalu lancarkan kuliahmu dan bimbing setiap langkahmu menuju masa depan. ​aku juga berdoa buat keluarga kamu, semoga Tuhan selalu beri kesehatan, kedamaian, dan berkat yang melimpah di rumah kalian. dan buat hubungan kita yang baru ini, semoga Tuhan selalu menyertai dan jaga komunikasi kita. semoga ke depannya kita bisa saling mendukung, bertumbuh bareng, dan tetap satu tujuan di dalam Tuhan. God bless you and your family always, ya! 🤍";

let i = 0;

function next() {
  document.getElementById("screen1").classList.add("hidden");
  document.getElementById("screen2").classList.remove("hidden");
  typeEffect();
}

function typeEffect() {
  if (i < message.length) {
    document.getElementById("text").innerHTML += message.charAt(i);
    i++;
    setTimeout(typeEffect, 40);
  }
}

/* particles generator */
for (let i = 0; i < 40; i++) {
  let p = document.createElement("div");
  p.className = "particle";
  p.style.left = Math.random() * 100 + "vw";
  p.style.animationDuration = (5 + Math.random() * 5) + "s";
  document.body.appendChild(p);
}
</script>

</body>
</html>
